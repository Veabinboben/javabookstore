<div class = "form-container">
    <form>
<label >Ammount</label>
<input type="number" [formField]="stockForm.stock" />
<input matInput
    placeholder="Warehouses"
    [matAutocomplete]="WarehousesAuto"
    (input)="onWarehouseSearch($any($event.target).value)"
    [value]="warehouseSearch()"
    >
    
    <mat-autocomplete #WarehousesAuto="matAutocomplete"
    (optionSelected)="onWarehouseSelected($event)">
    @for (warehouse of warehouses$ | async; track warehouse.id) {
        <mat-option [value]="warehouse">{{ warehouse.adress }}</mat-option>
    }
    </mat-autocomplete>

<button [disabled]="!stockForm().valid()" (click)="submitForm()">Submit</button>
</form>
</div>
