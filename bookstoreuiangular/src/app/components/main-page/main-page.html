<section>
    <!-- <nav>
        <a routerLink="form">Settings</a>
    </nav> -->
    <!-- <router-outlet /> -->

    <input class = "rounded-input" type="text" placeholder="Filter by city" #filter>
    <button class="primary" matButton="tonal" (click)="filterResults(filter.value)">Search</button>
    <div class="books-grid">
    
        @for (book of books$ | async; track book.id) {
        <app-book
            [book] = "book"
        ></app-book>
        } @empty {
            <!-- TODO add loader -->
            <li>There are no items.</li>
        }
    </div>
    <mat-paginator
    [length]="length"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    [pageIndex]="pageIndex"
    (page)="pageEvent($event)"
    aria-label="Select page"
    showFirstLastButtons
    ></mat-paginator>
    <ng-template #loading>Loading…</ng-template>
</section>
