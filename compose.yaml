version: "3.8"
services:

  angular:
    image: bookstoreangular   # built locally with: docker build -t my-spring-app:latest .
    build:
      context: ./bookstoreuiangular
      dockerfile: Dockerfile
    container_name: bookstore-angular
    ports:
      - "4200:8080"

  server:
    image: bookstoreserver   # built locally with: docker build -t my-spring-app:latest .
    build:
      context: ./bookstoreserver
      dockerfile: Dockerfile
    container_name: bookstore-server
    ports:
      - "8080:8080"
    environment:
      - APP_FILE_UPLOAD_DIR=/app/uploads/
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/javadb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs
      - uploads-data:/app/uploads/


  db:
    image: postgres:15
    container_name: bookstore-db
    environment:
      - POSTGRES_DB=javadb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro


volumes:
  db_data:
  uploads-data:
 