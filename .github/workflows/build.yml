name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, test, upload reports and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set up PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: 15
          username: postgres
          password: admin
          database: javadb

      - name: Check PostgreSQL status
        run: |
          sudo service postgresql start
          sudo service postgresql status

      - name: Build, run tests and generate JaCoCo report
        working-directory: ./bookstoreserver
        run: |
          # Run tests and produce JaCoCo xml and surefire/junit reports
          mvn -B clean verify \
            -DskipITs=true \
            jacoco:report

      - name: Upload test and coverage artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            bookstoreserver/target/site/jacoco/jacoco.xml
            bookstoreserver/target/surefire-reports
            bookstoreserver/target/jacoco.exec

      - name: Run SonarQube analysis (SonarCloud)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: ./bookstoreserver
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=Veabinboben_javabookstore \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.java.coveragePlugin=jacoco \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.junit.reportPaths=target/surefire-reports \
            -Dsonar.tests=src/test/java \
            -Dsonar.sources=src/main/java
